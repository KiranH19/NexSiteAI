<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexSite - AI Website Builder Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body style="overflow: hidden;">

  <div class="chat-container">
    
    <!-- Sidebar (Desktop Left Column) -->
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <div class="bot-profile">
          <div class="avatar">NS</div>
          <div class="bot-info">
            <h3>NexSite Builder</h3>
            <span class="status-online">System Online</span>
          </div>
        </div>
        <a href="index.html" style="color: var(--text-secondary); font-size: 1.2rem;" title="Go to home">
          <ion-icon name="home-outline"></ion-icon>
        </a>
      </div>

      <!-- Quick Tips -->
      <div style="padding: 24px; color: var(--text-secondary); font-size: 0.85rem; flex: 1; border-top: 1px solid rgba(255,255,255,0.03);">
        <h4 style="color: var(--text-primary); margin-bottom: 12px; font-family: var(--font-heading);">How it works:</h4>
        <ul style="list-style: none; display: flex; flex-direction: column; gap: 12px; line-height: 1.4;">
          <li><ion-icon name="play-outline" style="vertical-align: middle; color: var(--wa-accent);"></ion-icon> Answer one simple question at a time.</li>
          <li><ion-icon name="play-outline" style="vertical-align: middle; color: var(--wa-accent);"></ion-icon> Details are fed to Grok AI to draft page copies.</li>
          <li><ion-icon name="play-outline" style="vertical-align: middle; color: var(--wa-accent);"></ion-icon> You'll preview templates and adjust details afterward.</li>
        </ul>
      </div>
    </aside>

    <!-- Main Chat Window -->
    <main class="chat-main">
      
      <!-- Top Bar -->
      <header class="chat-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div class="avatar" style="width: 40px; height: 40px; background: var(--wa-accent);">🤖</div>
          <div>
            <h3 style="font-size: 0.95rem;">NexSite Website Agent</h3>
            <span style="font-size: 0.75rem; color: var(--wa-accent);">typing...</span>
          </div>
        </div>
      </header>

      <!-- Chat History Area -->
      <section id="chat-thread" class="chat-thread">
        <!-- Messages will be appended here dynamically -->
      </section>

      <!-- Bottom Chat Input -->
      <footer class="chat-input-bar">
        <form id="chat-form" class="chat-input-form" onsubmit="handleSend(event)">
          <input 
            type="text" 
            id="message-input" 
            class="chat-input" 
            placeholder="Type your response here..." 
            autocomplete="off"
            required
          >
          <button type="submit" class="chat-send-btn">
            <ion-icon name="send"></ion-icon>
          </button>
        </form>
      </footer>

    </main>

  </div>

  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
