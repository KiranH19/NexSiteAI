<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/templates.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: Inter, sans-serif; }

    /* Full-screen loader */
    #site-loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0F0F1A, #1A1A2E);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
    }
    .loader-brand {
      font-size: 24px;
      font-weight: 800;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .loader-brand .lb-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .loader-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: rgba(255,255,255,0.5); font-size: 14px; }

    /* Powered by bar at the bottom */
    .powered-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(15,15,26,0.92);
      backdrop-filter: blur(10px);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      z-index: 900;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .powered-bar a {
      color: #6C63FF;
      text-decoration: none;
      font-weight: 600;
    }
    .powered-bar a:hover { text-decoration: underline; }
    #site-root { padding-bottom: 40px; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="site-loader">
    <div class="loader-brand">
      <div class="lb-icon">🌐</div>
      NexSite
    </div>
    <div class="loader-spinner"></div>
    <p class="loader-text">Loading your website...</p>
  </div>

  <!-- Website renders here -->
  <div id="site-root"></div>

  <!-- Powered by NexSite bar -->
  <div class="powered-bar">
    🌐 Built with <a href="/" target="_blank">NexSite</a> — Create your website in minutes
  </div>

  <!-- Scripts -->
  <script src="js/templates.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
